<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilos.css">
    <title>Contacto | Ahmed Design</title>
</head>

<body class="pagina-contacto">

    <section class="hero-contacto">
        <h1>Contáctanos</h1>
    </section>

    <div class="contenedor formulario-caja">
        <h2>Te asesoramos gratis y sin compromiso.</h2>
        <form action="https://formspree.io/f/xnjlzeap" method="POST">

            <input type="text" name="nombre" placeholder="Tu Nombre" required>

            <input type="email" name="email" placeholder="Tu Correo Electrónico" required>

            <textarea name="mensaje" placeholder="Cuéntanos sobre tu proyecto..." required></textarea>

            <input type="hidden" name="_next" value="index.html">

            <button type="submit" class="btn btn-primario">Enviar Mensaje</button>
            <a href="index.html" class="btn btn-secundario-volver">← Volver al inicio</a>
        </form>
    </div>

</body>

</html>
